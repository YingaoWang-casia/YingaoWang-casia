name: Update GitHub Stats SVG

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate profile SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRACKED_REPOSITORIES: Bairong-Xdynamics/TurnSense Baiji-Team/TurnSense
        run: node profile/generate-profile-svgs.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md profile/github-stats.svg profile/top-languages.svg profile/stats.svg profile/top-langs.svg profile/badges/*.svg
          if git diff --cached --quiet; then
            echo "No profile SVG changes."
          else
            git commit -m "chore: update profile SVGs [skip ci]"
            git push
          fi
